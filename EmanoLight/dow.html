<!DOCTYPE html>
<html>

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>Weekly Banner</title>

    <style>
        body {
            margin: 0;
            overflow: hidden;
            background: #000;
        }

        .banner {

            width: 100vw;
            height: 100vh;

            background-size: cover;
            background-position: center;

            animation:
                zoomBanner 30s infinite alternate,
                fadeBanner 2s;
        }

        @keyframes zoomBanner {

            0% {
                transform: scale(1);
            }

            100% {
                transform: scale(1.08);
            }

        }

        @keyframes fadeBanner {

            from {
                opacity: 0;
            }

            to {
                opacity: 1;
            }

        }

        .overlay {

            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;

            background:
                linear-gradient(rgba(0, 0, 0, .1),
                    rgba(0, 0, 0, .3));

        }
    </style>

</head>

<body>

    <div class="banner" id="banner"></div>

    <div class="overlay"></div>

    <script>

        const day = new Date().getDay();

        const banners = [
            'Assets/banner1.jpg',
            'Assets/banner2.jpg',
            'Assets/banner3.jpg',
            'Assets/banner4.jpg',
            'Assets/banner5.jpg',
            'Assets/banner6.jpg',
            'Assets/banner7.jpg'
        ];

        document.getElementById('banner').style.backgroundImage =
            `url(${banners[day]})`;

    </script>

</body>

</html>
