<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <title>SheTrade Banners</title>

    <style>
        body {
            margin: 0;
            background: #f7f1e7;
            font-family: Segoe UI;
        }

        .slider {
            position: relative;
            width: 100%;
            height: 100vh;
            overflow: hidden;
        }

        .slide {
            position: absolute;
            width: 100%;
            height: 100%;
            opacity: 0;
            transition: opacity 1s ease;
        }

        .slide.active {
            opacity: 1;
        }

        .slide img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .nav {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            font-size: 50px;
            background: rgba(0, 0, 0, .4);
            color: white;
            padding: 10px 20px;
            cursor: pointer;
            z-index: 999;
            user-select: none;
        }

        .prev {
            left: 20px;
        }

        .next {
            right: 20px;
        }

        .counter {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background: rgba(0, 0, 0, .5);
            color: white;
            padding: 10px 20px;
            border-radius: 30px;
            z-index: 999;
        }
    </style>

</head>

<body>

    <div class="slider">

        <div class="slide active">
            <img src="Assets/banner1.jpg">
        </div>

        <div class="slide">
            <img src="Assets/banner2.jpg">
        </div>

        <div class="slide">
            <img src="Assets/banner3.jpg">
        </div>

        <div class="slide">
            <img src="Assets/banner4.jpg">
        </div>

        <div class="slide">
            <img src="Assets/banner5.jpg">
        </div>

        <div class="slide">
            <img src="Assets/banner6.jpg">
        </div>

        <div class="slide">
            <img src="Assets/banner7.jpg">
        </div>

        <div class="nav prev">&#10094;</div>
        <div class="nav next">&#10095;</div>

        <div class="counter" id="counter">
            1 / 7
        </div>

    </div>

    <script>

        const slides = document.querySelectorAll('.slide');
        const counter = document.getElementById('counter');

        let current = 0;

        function showSlide(i) {

            slides.forEach(s => s.classList.remove('active'));

            slides[i].classList.add('active');

            counter.innerHTML = (i + 1) + ' / ' + slides.length;

        }

        function nextSlide() {

            current++;

            if (current >= slides.length)
                current = 0;

            showSlide(current);

        }

        function prevSlide() {

            current--;

            if (current < 0)
                current = slides.length - 1;

            showSlide(current);

        }

        document.querySelector('.next').onclick = nextSlide;
        document.querySelector('.prev').onclick = prevSlide;

        setInterval(nextSlide, 10000);

    </script>

</body>

</html>
